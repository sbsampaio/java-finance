<?xml version="1.0" encoding="UTF-8"?>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:jsf="http://xmlns.jcp.org/jsf"
                xmlns:pt="http://xmlns.jcp.org/jsf/passthrough"
                xmlns:p="http://primefaces.org/ui"
                xmlns:adm="http://github.com/adminfaces"
                template="/WEB-INF/templates/template.xhtml">

    <ui:define name="title">
        <h:outputText value="#{msgsCore['manageAccounts.title']}" />
    </ui:define>

    <ui:define name="description">
        <h:outputText value="#{msgsCore['manageAccounts.title.description']}" />
    </ui:define>

    <ui:define name="body">
        <adm:breadcrumb link="/core/manageAccounts/index"
                        title="#{msgsCore['manageAccounts.title']}" />

        <h:form id="form">
            <!-- The listing. -->
            <p:panel header="#{msgsCore['manageAccounts.text.entities']}"
                     styleClass="card no-border">
                <p:dataTable id="dt-entities"
                             widgetVar="dtEntities"
                             var="entity"
                             value="#{manageAccountsController.entities}"
                             emptyMessage="#{msgsCore['manageAccount.text.emptyMessage']}"
                             reflow="true"
                             selection="#{manageAccountsController.selectedEntities}"
                             rowKey="#{entity.id}"
                             paginator="true"
                             rows="10"
                             rowSelectionMode="add"
                             paginatorPosition="botton">

                    <p:ajax event="filter"
                            ignoreAutoUpdate="true" />
                    <f:facet name="footer">

                        <!-- New and Delete buttons. -->
                        <div style="float: right; margin-top: -40px;">
                            <p:commandButton value="#msgs['jbutler.crud.button.create']"
                                             icon="pi pi-plus"
                                             actionListener="#{manageAccountsController.openNew}"
                                             update=":form:manage-entity-content"
                                             oncomplete="PF('formDialog').show()"
                                             style="margin-right: .5rem">

                                <p:resetInput target=":form:manage-entity-content" />
                            </p:commandButton>

                            <p:commandButton id="delete-entities-button"
                                             value="#{msgs['jbutler.crud.button.delete']}"
                                             icon="pi pi-trash"
                                             actionListener="#{manageAccountsController.deleteSelectedEntities}"
                                             disabled="#{!manageAccountsController.hasSelectedEntities()}"
                                             update="@this">

                                <p:confirm header="#{msgs['jbutler.crud.title.confirmation']}"
                                           message="#{msgsCore['manageAccounts.text.deleteConfirmation']}"
                                           icon="pi pi-exclamation-triangle" />
                            </p:commandButton>
                        </div>
                    </f:facet>

                    <p:ajax event="rowSelect"
                            update="delete-entities-button" />
                    <p:ajax event="rowUnselect"
                            update="delete-entities-button" />
                    <p:ajax event="rowSelectCheckbox"
                            update="delete-entities-button" />
                    <p:ajax event="rowUnselectCheckbox"
                            update="delete-entities-button" />
                    <p:ajax event="toggleSelect"
                            update="delete-entities-button" />

                    <p:column width="40"
                              selectionMode="multiple"
                              exportable="false"></p:column>

                    <!-- Account data. -->
                    <p:column headerText="#{msgsCore['manageAccounts.field.name']}"
                              sortBy="#{entity.name}"
                              filterBy="#{entity.name}"
                              filterStyle="display: none">
                        <h:outputText value="#{entity.name}" />
                    </p:column>
                    <p:column headerText="#{msgsCore['manageAccounts.field.type']}"
                              sortBy="#{entity.type}"
                              filterBy="#{entity.type}"
                              filterStyle="display: none">
                        <h:outputText value="#{entity.type}" />
                    </p:column>
                    <p:column headerText="#{msgsCore['manageAccounts.field.balance']}"
                              sortBy="#{entity.balance}"
                              filterBy="#{entity.balance}"
                              filterStyle="display: none">
                        <h:outputText value="#{entity.balance}" />
                    </p:column>

                    <p:column exportable="false"
                              style="text-align: center;">
                        <f:facet name="header">
                            <i class="pi pi-search"></i>
                            <p:inputText id="globalFilter"
                                         onkeyup="PF('dtEntities').filter()"
                                         placeholder="#{msgs['jbutler.crud.text.search']}"
                                         style="margin-left: 10px;" />
                        </f:facet>
                        <p:commandButton icon="pi pi-pencil"
                                         update=":form:manage-entity-content"
                                         oncomplete="PF('formDialog').show()"
                                         process="@this">
                            <f:setPropertyActionListener value="#{entity}"
                                                         target="#{manageAccountsController.selectedEntity}" />
                            <p:resetInput target=":form:manage-entity-content" />
                        </p:commandButton>
                        <p:commandButton icon="pi pi-trash"
                                         process="@this"
                                         oncomplete="PF('deleteEntityDialog').show()">
                            <f:setPropertyActionListener value="#{entity}"
                                                         target="#{manageAccountsController.selectedEntity}" />
                        </p:commandButton>

                    </p:column>
                </p:dataTable>
            </p:panel>

            <!-- Dialog to create new entities or update existing ones. -->
            <p:dialog header="#{msgsCore['manageAccounts.title.detail']}"
                      showEffect="fade"
                      widgetVar="formDialog"
                      responsive="true"
                      width="450"
                      modal="true">
                <p:outputPanel id="manage-entity-content">
                    <p:outputPanel rendered="#{not empty manageAccountsController.selectedEntity}">
                        <p:panelGrid columns="2"
                                     cellpadding="5"
                                     layout="grid"
                                     styleClass="ui-fluid card"
                                     columnClasses="ui-grid-col-4,ui-grid-col-8">
                            <p:outputLabel for="nameField"
                                           value="#{msgsCore['manageAccounts.field.name']}" />
                            <h:panelGroup id="nameGroup">
                                <p:message id="nameMsgs"
                                           for="nameField" />
                                <p:inputText id="nameField"
                                             value="#{manageAccountsController.selectedEntity.name}"
                                             required="true">
                                    <p:ajax event="blur"
                                            process="@this"
                                            update="nameMsgs" />
                                </p:inputText>
                            </h:panelGroup>

                            <p:outputLabel for="typeField"
                                           value="#{msgsCore['manageAccounts.field.type']}" />
                            <h:panelGroup id="typeGroup">
                                <p:message id="typeMsgs"
                                           for="typeField" />
                                <p:inputText id="typeField"
                                             value="#{manageAccountsController.selectedEntity.type}"
                                             required="true">
                                    <p:ajax event="blur"
                                            process="@this"
                                            update="typeMsgs" />
                                </p:inputText>
                            </h:panelGroup>

                            <p:outputLabel for="balanceField"
                                           value="#{msgsCore['manageAccounts.field.balance']}" />
                            <h:panelGroup id="balanceGroup">
                                <p:message id="balanceMsgs"
                                           for="balanceField" />
                                <p:inputNumber id="balanceField"
                                               value="#{manageAccountsController.selectedEntity.balance}"
                                               required="true"
                                               decimalPlaces="0">
                                    <p:ajax event="blur"
                                            process="@this"
                                            update="balanceMsgs" />
                                </p:inputNumber>
                            </h:panelGroup>
                        </p:panelGrid>
                    </p:outputPanel>
                </p:outputPanel>

                <f:facet name="footer">
                    <p:commandButton id="saveButton"
                                     value="#{msgs['jbutler.crud.button.save']}"
                                     icon="pi pi-check"
                                     actionListener="#{manageAccountsController.save}"
                                     update="manage-entity-content"
                                     process="manage-entity-content @this"
                                     oncomplete="if(!args.validationError) PF('formDialog').hide()" />
                    <p:commandButton value="#{msgs['jbutler.crud.button.cancel']}"
                                     icon="pi pi-times"
                                     onclick="PF('formDialog').hide()" />
                    <p:defaultCommand target="saveButton" />
                </f:facet>
            </p:dialog>

            <!-- Dialog to confirm deletion. -->
            <p:confirmDialog widgetVar="deleteEntityDialog"
                             showEffect="fade"
                             width="300"
                             message="#{msgsCore['manageAccounts.text.deleteConfirmation']}"
                             header="#{msgs['jbutler.crud.title.confirmation']}"
                             severity="warn">
                <p:commandButton value="#{msgs['jbutler.crud.button.yes']}"
                                 icon="pi pi-check"
                                 actionListener="#{manageAccountsController.delete}"
                                 process="@this"
                                 oncomplete="PF('deleteEntityDialog').hide()" />
                <p:commandButton value="#{msgs['jbutler.crud.button.no']}"
                                 type="button"
                                 icon="pi pi-times"
                                 onclick="PF('deleteEntityDialog').hide()" />
            </p:confirmDialog>

            <!-- Global dialog used by p:confirm tags. -->
            <p:confirmDialog global="true"
                             showEffect="fade"
                             width="300">
                <p:commandButton value="#{msgs['jbutler.crud.button.no']}"
                                 type="button"
                                 icon="pi pi-times"
                                 styleClass="ui-confirmdialog-no" />
                <p:commandButton value="#{msgs['jbutler.crud.button.yes']}"
                                 type="button"
                                 icon="pi pi-check"
                                 styleClass="ui-confirmdialog-yes" />
            </p:confirmDialog>
        </h:form>
    </ui:define>
</ui:composition>
